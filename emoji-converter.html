<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji → PNG Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #f5e642;
    --accent2: #ff6b35;
    --text: #f0ede4;
    --muted: #666;
    --radius: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .app {
    width: 100%;
    max-width: 820px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .panel-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    margin-top: 20px;
  }
  label:first-of-type { margin-top: 0; }

  .emoji-input {
    width: 100%;
    font-size: 48px;
    line-height: 1.4;
    background: #111;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 20px;
    resize: none;
    height: 110px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
    text-align: center;
  }
  .emoji-input:focus { border-color: var(--accent); }

  .hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.6;
  }

  input[type="range"] {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    cursor: pointer;
    accent-color: var(--accent);
    height: 36px;
    padding: 0;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .range-row input[type="range"] { flex: 1; }
  .range-val {
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
    font-family: 'Unbounded', sans-serif;
  }

  .sep {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    margin-top: 8px;
  }
  .btn-primary:hover { background: #ffe81a; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-dl {
    background: var(--accent2);
    color: #fff;
  }
  .btn-dl:hover { background: #ff8050; transform: translateY(-1px); }

  .preview-panel {
    position: sticky;
    top: 20px;
  }

  .canvas-wrapper {
    background: repeating-conic-gradient(#222 0% 25%, #1a1a1a 0% 50%) 0 0 / 16px 16px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  canvas {
    max-width: 100%;
    max-height: 320px;
    border-radius: 3px;
    display: block;
  }

  .dl-row {
    display: flex;
    gap: 10px;
  }

  .badge {
    display: inline-block;
    background: #1e1e00;
    color: var(--accent);
    border: 1px solid #3a3a00;
    border-radius: 3px;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 6px;
    text-transform: uppercase;
    margin-left: 6px;
    vertical-align: middle;
  }

  .transparent-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #0e1e1a;
    border: 1px solid #1a3a33;
    color: #4de8c2;
    border-radius: 4px;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 10px;
    text-transform: uppercase;
    margin-top: 14px;
    font-family: 'Space Mono', monospace;
  }
  .transparent-badge::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4de8c2;
    box-shadow: 0 0 6px #4de8c2;
  }
</style>
</head>
<body>

<header>
  <div class="logo">EMOJI → PNG</div>
  <div class="tagline">Type it. Download it.</div>
</header>

<div class="app">
  <!-- Left: Controls -->
  <div class="panel">
    <div class="panel-title">Configure</div>

    <label>Emoji</label>
    <textarea class="emoji-input" id="emojiInput" placeholder="😎">😎</textarea>
    <div class="hint">Only the first emoji is used — centered on a 600×600 transparent canvas.</div>

    <div class="sep"></div>

    <label>Emoji Size <span class="badge">px</span></label>
    <div class="range-row">
      <input type="range" id="emojiSize" min="80" max="560" value="420" step="10">
      <span class="range-val" id="emojiSizeVal">420</span>
    </div>

    <div class="transparent-badge">Transparent background · PNG output</div>

    <div class="sep"></div>
    <button class="btn btn-primary" onclick="renderCanvas()">↻ Re-render Preview</button>
  </div>

  <!-- Right: Preview -->
  <div class="panel preview-panel">
    <div class="panel-title">Preview <span class="badge">600 × 600</span></div>

    <div class="canvas-wrapper">
      <canvas id="preview" width="600" height="600"></canvas>
    </div>

    <div class="dl-row">
      <button class="btn btn-dl" onclick="downloadImage()">⬇ Download PNG</button>
      <button class="btn btn-secondary" onclick="copyToClipboard()">⎘ Copy</button>
    </div>
    <div class="hint" style="margin-top:10px;" id="dlHint">PNG · 600×600px · transparent background</div>
  </div>
</div>

<script>
  const canvas = document.getElementById('preview');
  const ctx = canvas.getContext('2d');

  document.getElementById('emojiInput').addEventListener('input', renderCanvas);
  document.getElementById('emojiSize').addEventListener('input', () => {
    document.getElementById('emojiSizeVal').textContent = document.getElementById('emojiSize').value;
    renderCanvas();
  });

  function getFirstEmoji() {
    const text = document.getElementById('emojiInput').value.trim();
    if (!text) return '😎';
    if (typeof Intl.Segmenter !== 'undefined') {
      const seg = new Intl.Segmenter('en', { granularity: 'grapheme' });
      const segments = [...seg.segment(text)].map(s => s.segment).filter(s => s.trim());
      return segments[0] || '😎';
    }
    return text;
  }

  function renderCanvas() {
    const size = 600;
    canvas.width = size;
    canvas.height = size;

    ctx.clearRect(0, 0, size, size);

    const emoji = getFirstEmoji();
    const emojiSize = parseInt(document.getElementById('emojiSize').value);

    ctx.font = `${emojiSize}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.fillText(emoji, size / 2, size / 2);
  }

  function downloadImage() {
    const link = document.createElement('a');
    link.download = `emoji-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  async function copyToClipboard() {
    try {
      canvas.toBlob(async blob => {
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        const hint = document.getElementById('dlHint');
        const prev = hint.textContent;
        hint.textContent = '✓ Copied to clipboard!';
        setTimeout(() => hint.textContent = prev, 2000);
      });
    } catch {
      alert('Clipboard copy not supported in this browser. Use Download instead.');
    }
  }

  renderCanvas();
</script>
</body>
</html>
